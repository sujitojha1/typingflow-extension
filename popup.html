<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="glass-container">
    <div class="header">
      <h1>TypingFlow</h1>
      <p>Active Learning Companion</p>
    </div>
    
    <button id="btn-beautify" class="glass-btn">
      <span class="icon">🌟</span>
      <span class="text">Beautify Nuggets</span>
    </button>
    
    <button id="btn-type" class="glass-btn disabled" disabled>
      <span class="icon">⌨️</span>
      <span class="text">Typing Flow</span>
    </button>

    <button id="btn-save" class="glass-btn disabled" disabled>
      <span class="icon">💾</span>
      <span class="text">Save as HTML</span>
    </button>
    
    <div class="metrics">
      <div class="metric">
        <span class="m-val" id="m-chars">0</span>
        <span class="m-label">Total Typed</span>
      </div>
      <div class="metric">
        <span class="m-val" id="m-time">0m</span>
        <span class="m-label">On Site</span>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
